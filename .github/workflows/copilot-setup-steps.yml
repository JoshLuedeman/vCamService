name: Copilot Setup Steps

# Provisions the environment GitHub Copilot's coding agent uses for this repo:
# the .NET 10 SDK the project targets, Node.js (so the Copilot CLI and the
# hve-core-all plugin can be installed even though this is not a Node project),
# the repo's NuGet dependencies, and the hve-core-all plugin from
# github.com/microsoft/hve-core.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

permissions:
  contents: read

jobs:
  # The job MUST be named exactly `copilot-setup-steps` for the Copilot coding
  # agent to discover and run it as its environment setup.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Restore .NET dependencies
        # The solution targets net10.0-windows (WPF); a full restore/build only
        # succeeds on Windows. On the ubuntu-latest agent this is best-effort so
        # the setup does not fail before the Copilot CLI plugin is installed.
        run: dotnet restore vCamService.slnx
        continue-on-error: true

      - name: Install hve-core-all plugin
        run: bash .devcontainer/setup-hve-core.sh
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify tools
        run: |
          echo "dotnet:  $(dotnet --version 2>/dev/null || echo 'not available')"
          echo "node:    $(node --version 2>/dev/null || echo 'not available')"
          echo "npm:     $(npm --version 2>/dev/null || echo 'not available')"
          echo "copilot: $(copilot --version 2>/dev/null || echo 'not available')"
          copilot plugin list 2>/dev/null || echo "copilot plugin list unavailable"
